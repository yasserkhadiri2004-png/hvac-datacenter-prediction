site_name: "Prédiction Vaporisation Eau — Data Center"
site_description: "Prédiction de la quantité d'eau vaporisée du bassin d'une tour de refroidissement de data center par séries temporelles"
site_author: "Yasser Khadiri"
docs_dir: docs
repo_url: https://github.com/yasserkhadiri/hvac-datacenter-prediction
repo_name: hvac-datacenter-prediction

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: cyan
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - 🏠 Accueil: index.md
  - 📋 Introduction:
    - Contexte & Problématique: introduction.md
  - 📊 Dataset:
    - Description des données: dataset.md
  - ⚙️ Installation:
    - Prérequis & Setup: installation.md
  - 🔬 Méthodologie:
    - Vue d'ensemble: methodologie/overview.md
    - "Phase 1 — Statistique Classique": methodologie/phase1_statistique.md
    - "Phase 2 — Deep Learning": methodologie/phase2_deeplearning.md
    - "Phase 3 — XGBoost": methodologie/phase3_xgboost.md
    - "Phase 4 — Comparaison Finale": methodologie/phase4_comparaison.md
  - 📈 Résultats: resultats.md
  - 🏁 Conclusion: conclusion.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes

plugins:
  - search:
      lang: fr
